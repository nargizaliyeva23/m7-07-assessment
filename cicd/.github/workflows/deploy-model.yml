### `/.github/workflows/deploy-model.yml`
```yaml
name: MLOps Continuous Deployment Gate

on:
  push:
    branches:
      - main
    paths:
      - 'models/**'

permissions:
  contents: read
  id-token: write

jobs:
  validate-and-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pipeline Verification Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System Security Inspection Scan
        run: |
          echo "Executing Trivy Vulnerability Scan..."
          # Mock step representing: trivy fs --severity CRITICAL --exit-code 1 .

      - name: Execute Model Weight Invariant Assertions
        run: |
          pip install onnx
          python -c "import onnx; model = onnx.load('models/recommender_v2.onnx'); onnx.checker.check_model(model)"

  deploy-canary:
    needs: validate-and-gate
    runs-on: ubuntu-latest
    environment: production-canary
    steps:
      - name: AWS Credentials Setup
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::112233445566:role/github-actions-mlops
          aws-region: eu-west-1

      - name: Inject 5 Percent Canary Container Topology
        run: |
          echo "Deploying container to EKS..."
          # Mock step representing: kubectl set image deployment/recommender-engine-canary recommender=112233445566.dkr.ecr.eu-west-1.amazonaws.com/prod-rec:${{ github.sha }} --namespace=ml-serving