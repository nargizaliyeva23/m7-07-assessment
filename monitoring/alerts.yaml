groups:
  - name: recommendation-service-alerts
    rules:
      - alert: ModelVersionMismatchDetected
        expr: count by (v1_2_0) (http_requests_total{model_version!="v1.2.0"}) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical Alert: Traffic routed to incorrect or unapproved model version!"

      - alert: HighInferenceLatencyServiceBreach
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.080
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Inference Latency Target Exceeded: p95 latency is higher than the allocated 80ms container budget."

      - alert: ErrorBudgetBurnRateHigh
        expr: rate(http_requests_total{status=~"5.."}[1h]) / rate(http_requests_total[1h]) > 0.01
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Error Budget Burn Rate Warning: More than 1% failure rate detected over the last hour."