openapi: 3.1.0
info:
  title: Personalized Retail Recommendation Service
  version: 1.2.0
  description: Real-time high-throughput API serving personalized home-screen items.
paths:
  /recommendations/realtime:
    post:
      summary: Synchronous Real-time Recommendation for Single User
      parameters:
        - name: X-Correlation-ID
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: "usr_992184"
      responses:
        '200':
          description: Successful Recommendation Output
          headers:
            X-Model-Version:
              schema:
                type: string
                example: "v1.2.0"
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommended_product_ids:
                    type: array
                    items:
                      type: string
                    example: ["prod_102", "prod_551", "prod_009"]
  /recommendations/batch:
    post:
      summary: Batch Recommendations for Offline Marketing or Pre-computation
      description: Process multiple customer recommendation pipelines concurrently.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_ids]
              properties:
                user_ids:
                  type: array
                  items:
                    type: string
                  example: ["usr_1", "usr_2"]
      responses:
        '200':
          description: Array of recommendations returned asynchronously or via direct batch stream.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object